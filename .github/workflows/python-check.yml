name: Python Check

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  python-312-import-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Verify requires-python
        run: uv run python -c "import sys; assert sys.version_info >= (3, 12), sys.version"

      - name: Sync Python dependencies
        run: uv sync --frozen

      - name: Import RL stack (3.10+ type syntax)
        env:
          PYTHONPATH: .
        run: |
          uv run python -c "from rl.env.auto_upgrade import AutoUpgradePolicy, PRESET_BUILDS"
          uv run python -c "from rl.env import DiepCustomParallelEnv"
